<!DOCTYPE html>
<html>
<head>
    <title>College Admission System</title>
</head>
<body>

<h1>College Admission Form</h1>

<form action="/add" method="POST">

    <input type="text"
           name="name"
           placeholder="Student Name"
           required>

    <br><br>

    <input type="number"
           name="age"
           placeholder="Age"
           required>

    <br><br>

    <input type="email"
           name="email"
           placeholder="Email"
           required>

    <br><br>

    <input type="text"
           name="course"
           placeholder="Course"
           required>

    <br><br>

    <input type="number"
           step="0.01"
           name="marks"
           placeholder="Marks"
           required>

    <br><br>

    <button type="submit">
        Submit Admission
    </button>

</form>

<br>

<a href="/students">
    View Admissions
</a>

</body>
</html>
