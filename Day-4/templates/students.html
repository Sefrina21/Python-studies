<!DOCTYPE html>
<html>
<head>
    <title>Admissions</title>
</head>
<body>

<h1>Student Admissions</h1>

<form action="/search" method="POST">

    <input type="text"
           name="keyword"
           placeholder="Search Student">

    <button type="submit">
        Search
    </button>

</form>

<br>

<table border="1">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Age</th>
    <th>Email</th>
    <th>Course</th>
    <th>Marks</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for student in students %}

<tr>

<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>
<td>{{ student[3] }}</td>
<td>{{ student[4] }}</td>
<td>{{ student[5] }}</td>
<td>{{ student[6] }}</td>

<td>
<a href="/delete/{{ student[0] }}">
Delete
</a>
</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/">
Back
</a>

</body>
</html>
